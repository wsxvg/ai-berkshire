                    - paragraph [ref=f9e49]: 25分钟前
                  - generic [ref=f9e50]: 近期AI硬件回调，创新药、云计算和AI应用轮动表演，周五又杀出一个商业航天。我应该追哪个好？ 我猜大家是不是想我这个问题。 或者也有人想问，AI科技要不要加仓？加海外链还是国产链？ 今天我分三条动态说说我的观点，供大家参考。 首先，说说创新药板块。创新药是此轮AI硬件调整中唯一一个走出确定上升趋势的方向。我在拐点提示了两次。为什么说它走出确定上升趋势，就是这个方向资金有在低位沉了底仓，并且一些没有出来。就在上周成功站上了60日线，并且三日没回落，说明趋势确认熊转牛。但是这个方向还没有走出一个回落段，没有做出二买结构，不确定这轮资金反弹后的意图。我只能说有仓位的拿着，没仓位的观察走势。因为这个方向现在就是科技的对手盘，科技出来的钱就到了这里，值得大家关注。
