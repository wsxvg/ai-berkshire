                    - text: 1. SK海力士于美东时间7月10日以ADR形式在美股上市，发行价149美元，首日开盘大涨超15%，发行规模达265亿美元，认购倍数超7倍。 2. 高盛研报指出，SK海力士HBM全球市占率超57%，长协订单锁定至2028年，2026年一季度营业利润率预计达72%，且ADR发行价较韩股溢价仅3.1%，估值无明显泡沫。 3. 多家ETF发行商已申请推出跟踪SK海力士ADR的杠杆及反向策略产品，其杠杆ETF在港交所已成为全球同类最大产品之一；韩国股市中，SK海力士与三星电子成交额占市场总成交额比重显著。
