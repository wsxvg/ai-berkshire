                      - generic [ref=f19e120]: 同泰、红土创新等基金公司披露2026年二季报
                      - text: 1. 同泰、红土创新等基金公司2026年二季报显示，主动权益基金继续重仓AI算力基建产业链，重点加仓国产芯片、光通信、半导体设备等领域，并更注重海外与国产算力链的均衡布局。 2. 基金经理普遍认为AI算力基建仍是科技投资核心主线，看好其高景气度与确定性，但提醒投资者注意高预期下的高波动风险，未来将围绕算力基建、新技术及上下游环节深化布局。 3. 红土创新医疗保健基金二季度调整持仓，集中配置创新药、高端医疗器械等长期成长领域；其他基金亦在AI、TMT及机器人等领域积极配置，强调以基本面成长性作为选股重要标准。
