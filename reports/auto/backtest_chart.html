<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>策略D 回测对比</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; padding: 24px; }
h1 { font-size: 24px; margin-bottom: 8px; }
.subtitle { color: #94a3b8; margin-bottom: 24px; }
.metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
.card { background: #1e293b; border-radius: 12px; padding: 16px; }
.card h3 { font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
.card .value { font-size: 28px; font-weight: 700; }
.card.equity { border-left: 3px solid #3b82f6; }
.card.blended { border-left: 3px solid #22c55e; }
.card.benchmark { border-left: 3px solid #f59e0b; }
.text-blue { color: #60a5fa; }
.text-green { color: #4ade80; }
.text-yellow { color: #fbbf24; }
.text-red { color: #f87171; }
.chart-container { background: #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { padding: 8px 12px; text-align: right; border-bottom: 1px solid #334155; }
th { color: #94a3b8; font-weight: 500; }
td:first-child, th:first-child { text-align: left; }
tr:hover { background: #1e293b; }
.tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; background: #1e293b; border: 1px solid #334155; color: #94a3b8; font-size: 14px; }
.tab.active { background: #3b82f6; color: white; border-color: #3b82f6; }
</style>
</head>
<body>

<h1>策略D · 回测对比</h1>
<p class="subtitle">100%权益 vs 80%权益+20%短债(007194) · 2024-03-11 ~ 2026-06-30</p>

<div class="metrics" id="metrics"></div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('value')">净值曲线</div>
  <div class="tab" onclick="switchTab('drawdown')">回撤曲线</div>
  <div class="tab" onclick="switchTab('allocation')">仓位结构</div>
</div>

<div class="chart-container"><canvas id="mainChart" height="300"></canvas></div>

<div style="background:#1e293b;border-radius:12px;padding:16px;">
  <table id="dataTable">
    <thead><tr><th>日期</th><th>100%权益</th><th>80/20混合</th><th>债基占比</th></tr></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
let data = null;
let currentTab = 'value';
let chart = null;

fetch('backtest_blended.json')
  .then(r => r.json())
  .then(d => { data = d; render(); })
  .catch(e => document.body.innerHTML += '<p>Error loading data</p>');

function render() {
  const eq = data.equity;
  const bl = data.blended;

  const eqFinal = eq.final;
  const blFinal = bl.final;
  const bmVal = 100000 * (1 + eq.bm / 100);

  document.getElementById('metrics').innerHTML = `
    <div class="card equity"><h3>100%权益</h3>
      <div class="value text-blue">+${eq.ret.toFixed(2)}%</div>
      <div style="font-size:13px;color:#94a3b8;margin-top:4px">回撤 ${eq.dd.toFixed(1)}% · 终值 ¥${Math.round(eqFinal).toLocaleString()}</div>
    </div>
    <div class="card blended"><h3>80%权益+20%债基</h3>
      <div class="value text-green">+${bl.ret.toFixed(2)}%</div>
      <div style="font-size:13px;color:#94a3b8;margin-top:4px">回撤 ${bl.dd.toFixed(1)}% · 终值 ¥${Math.round(blFinal).toLocaleString()}</div>
    </div>
    <div class="card benchmark"><h3>沪深300基准</h3>
      <div class="value text-yellow">+${eq.bm.toFixed(2)}%</div>
      <div style="font-size:13px;color:#94a3b8;margin-top:4px">终值 ¥${Math.round(bmVal).toLocaleString()}</div>
    </div>
  `;

  renderChart();
  renderTable();
}

function renderChart() {
  const eq = data.equity;
  const bl = data.blended;
  const ctx = document.getElementById('mainChart').getContext('2d');

  const labels = eq.vals.map(v => v.d);
  const eqValues = eq.vals.map(v => v.v);
  const blValues = bl.vals.map(v => v.total);

  const eqDD = computeDD(eqValues);
  const blDD = computeDD(blValues);

  if (chart) chart.destroy();

  const datasets = [];
  const colors = { equity: '#3b82f6', blended: '#22c55e', benchmark: '#f59e0b' };

  if (currentTab === 'value') {
    const bmStart = eq.vals[0].v;
    const bmValues = eq.vals.map((v, i) => bmStart * (1 + (eq.bm / 100) * (i / (eq.vals.length-1))));
    datasets.push(
      { label: '100%权益', data: eqValues, borderColor: colors.equity, backgroundColor: 'transparent', borderWidth: 2, tension: 0.3 },
      { label: '80/20混合', data: blValues, borderColor: colors.blended, backgroundColor: 'transparent', borderWidth: 2, tension: 0.3 },
      { label: '沪深300', data: bmValues, borderColor: colors.benchmark, backgroundColor: 'transparent', borderWidth: 1.5, borderDash: [5,5], tension: 0.3 }
    );
  } else if (currentTab === 'drawdown') {
    datasets.push(
      { label: '100%权益回撤', data: eqDD, borderColor: colors.equity, backgroundColor: 'transparent', borderWidth: 2, tension: 0.3 },
      { label: '80/20混合回撤', data: blDD, borderColor: colors.blended, backgroundColor: 'transparent', borderWidth: 2, tension: 0.3 }
    );
  } else if (currentTab === 'allocation') {
    const bondPcts = bl.vals.map(v => v.bond_pct);
    const eqPcts = bl.vals.map(v => 100 - v.bond_pct);
    datasets.push(
      { label: '权益占比', data: eqPcts, backgroundColor: '#3b82f6', borderRadius: 2 },
      { label: '债基占比', data: bondPcts, backgroundColor: '#22c55e', borderRadius: 2 }
    );
  }

  chart = new Chart(ctx, {
    type: currentTab === 'allocation' ? 'bar' : 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#94a3b8', font: { size: 12 } } },
        tooltip: {
          callbacks: {
            label: ctx => {
              const val = ctx.parsed.y;
              if (currentTab === 'allocation') return `${ctx.dataset.label}: ${val.toFixed(1)}%`;
              return `${ctx.dataset.label}: ¥${val.toLocaleString('zh-CN', {minimumFractionDigits:0})}`;
            }
          }
        }
      },
      scales: {
        x: { ticks: { color: '#64748b', maxTicksLimit: 12, font: { size: 11 } }, grid: { color: '#1e293b' } },
        y: {
          ticks: { color: '#64748b', font: { size: 11 },
            callback: v => currentTab === 'allocation' ? v + '%' : '¥' + v.toLocaleString()
          }, grid: { color: '#334155' }
        }
      }
    }
  });
}

function computeDD(values) {
  let peak = values[0];
  return values.map(v => {
    if (v > peak) peak = v;
    return ((peak - v) / peak * 100);
  });
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab')[['value','drawdown','allocation'].indexOf(tab)].classList.add('active');
  if (data) renderChart();
}

function renderTable() {
  const eq = data.equity;
  const bl = data.blended;
  let html = '';
  const step = Math.max(1, Math.floor(eq.vals.length / 30));
  for (let i = 0; i < eq.vals.length; i += step) {
    const v = eq.vals[i];
    const bv = bl.vals[i] || {total: 0, bond_pct: 0};
    html += `<tr><td>${v.d}</td><td class="text-blue">¥${Math.round(v.v).toLocaleString()}</td>
      <td class="text-green">¥${Math.round(bv.total).toLocaleString()}</td>
      <td>${bv.bond_pct.toFixed(0)}%</td></tr>`;
  }
  document.getElementById('tableBody').innerHTML = html;
}
</script>
</body>
</html>
