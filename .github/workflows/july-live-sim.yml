name: 7月实盘模拟

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  july-sim:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install chinese_calendar

      - name: Verify fund chart data
        run: |
          echo "Fund charts: $(ls data/fund_charts/*.json 2>/dev/null | wc -l) files"
          echo "Trading data: $(ls backtest/data/*.json 2>/dev/null | wc -l) files"

      - name: Run July live simulation
        run: |
          python -X utf8 scripts/july_live_sim.py 2>&1 | tee july_sim.log
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: july-sim-results
          path: |
            july_sim.log

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add july_sim.log 2>/dev/null || true
          git diff --cached --quiet || git commit -m "7月实盘模拟结果 $(date +%Y-%m-%d)"
          git push || echo "push skipped"
