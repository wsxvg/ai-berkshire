name: 7月实盘模拟

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  july-sim:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install chinese_calendar

      - name: Restore fund chart cache
        uses: actions/cache@v4
        with:
          path: data/fund_charts
          key: fund-charts-${{ hashFiles('data/fund_charts_index.json') }}
          restore-keys: |
            fund-charts-

      - name: Restore trading data cache
        uses: actions/cache@v4
        with:
          path: backtest/data
          key: trading-data-v1
          restore-keys: |
            trading-data-

      - name: Run July live simulation
        run: |
          python -X utf8 scripts/july_live_sim.py 2>&1 | tee july_sim.log
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: july-sim-results
          path: |
            july_sim.log

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add july_sim.log 2>/dev/null || true
          git diff --cached --quiet || git commit -m "7月实盘模拟结果 $(date +%Y-%m-%d)"
          git push || echo "push skipped"
