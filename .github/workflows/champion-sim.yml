name: 每日冠军策略模拟 (V2 增强)

on:
  schedule:
    - cron: '30 6 * * 1-5'   # 工作日 14:30 CST
  workflow_dispatch:            # 手动触发

permissions:
  contents: write

env:
  FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
  FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
  FEISHU_USER_ID: ${{ secrets.FEISHU_USER_ID }}

jobs:
  champion-sim:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install lightgbm scikit-learn numpy
          pip install chinese_calendar

      - name: 写入京东Cookie
        if: env.JD_COOKIES != ''
        env:
          JD_COOKIES: ${{ secrets.JD_COOKIES }}
        run: |
          mkdir -p data/jd_auth
          echo "$JD_COOKIES" > data/jd_auth/cookies.json

      - name: 运行冠军策略实盘模拟 (含飞书推送)
        run: python scripts/daily_live.py

      - name: 提交日报
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/sim/
          git diff --cached --quiet || git commit -m "冠军策略日报 $(date +%Y-%m-%d)"
          git push
