name: 每日冠军策略模拟

on:
  schedule:
    - cron: '30 6 * * 1-5'   # 工作日 14:30 CST
  workflow_dispatch:            # 手动触发

permissions:
  contents: write

jobs:
  champion-sim:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install lightgbm scikit-learn numpy

      - name: 运行冠军策略模拟
        run: |
          python scripts/daily_live_enhanced.py \
            --config data/evolution/best_config.json \
            --paper-mode auto

      - name: 检查偏差
        run: |
          python scripts/check_deviation.py || echo "WARNING: deviation exceeded"

      - name: 提交日报
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/sim/
          STATUS=$(python -c "import json; d=json.load(open('reports/sim/champion_status.json')); print(d.get('status','ok'))" 2>/dev/null || echo "ok")
          git commit -m "冠军策略日报 $(date +%Y-%m-%d) [$STATUS]" || true
          git push || true
