name: Backtest Matrix (A+B+C)

on:
  workflow_dispatch:
    inputs:
      test_name:
        description: 'Single test name (empty = run all)'
        required: false
        default: ''
  push:
    paths:
      - 'backtest/engine/backtest.py'
      - 'tools/market_risk.py'
      - 'tools/market_predictor.py'
      - 'backtest/run_single_test.py'

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        test_name: [
          baseline,
          A1_macd_div, A2_bollinger, A3_yearly_ma, A4_rsi70, A5_all_combined,
          B1_risk60, B2_risk50, B3_risk40,
          C1_predictor60, C2_predictor55,
          OC_time_stop120, OC_rsi_sell80, OC_no_new_high20, OC_ma_cross, OC_dd_breaker12
        ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install lightgbm scikit-learn numpy pandas
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run backtest
        run: python backtest/run_single_test.py ${{ matrix.test_name }}

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.test_name }}
          path: backtest/results/${{ matrix.test_name }}.json

  collect-results:
    needs: backtest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: backtest/results
          merge-multiple: true

      - name: Generate summary
        run: python backtest/collect_results.py

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: backtest-summary
          path: backtest/reports/unified_backtest_summary.json
