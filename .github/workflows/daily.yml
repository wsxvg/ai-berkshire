name: daily_check

on:
  schedule:
    # 北京时间 14:30 (UTC 06:30) 跑
    - cron: '30 6 * * 1-5'
  workflow_dispatch:  # 手动触发

jobs:
  daily-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: daily_check 体检
        env:
          JD_COOKIES: ${{ secrets.JD_COOKIES }}
        run: |
          python -X utf8 scripts/daily_check.py 2>&1 | tee logs/daily_check_ci.log

      - name: 30 天 V2 回测
        run: |
          python -X utf8 scripts/daily_push.py --no-feishu --no-backtest=false 2>&1 | tee logs/daily_push_ci.log

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-check-${{ github.run_id }}
          path: |
            data/daily_check_*.json
            reports/daily_check_*.md
            logs/daily_check_ci.log
            logs/daily_push_ci.log
