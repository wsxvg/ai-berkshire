name: 每日实盘模拟 + 飞书推送 (14:30 CST)

on:
  schedule:
    - cron: '30 6 * * 1-5'   # 工作日 14:30 CST (UTC+8 = 06:30 UTC)
  workflow_dispatch:            # 手动触发

permissions:
  contents: write

env:
  FEISHU_APP_ID: cli_a933badfd57bdbde
  FEISHU_APP_SECRET: zliAQFZ61YOVdhSz8vecahozbGz6Ym5j
  FEISHU_USER_ID: ou_67774e11bf8d8cf2b981cf2b09bac038

jobs:
  daily-sim:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install lightgbm scikit-learn numpy
          pip install chinese_calendar

      - name: 运行冠军策略实盘模拟 (含飞书推送)
        run: python scripts/daily_live.py

      - name: 提交日报
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/sim/
          git diff --cached --quiet || git commit -m "实盘日报 $(date +%Y-%m-%d)"
          git push
