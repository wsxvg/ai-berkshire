name: 每日实盘模拟 (14:30 CST)

on:
  schedule:
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-sim:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install lightgbm scikit-learn numpy

      - name: 运行实盘模拟
        run: python scripts/daily_live.py

      - name: 提交日报
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/sim/
          git diff --cached --quiet || git commit -m "实盘日报 $(date +%Y-%m-%d)"
          git push
