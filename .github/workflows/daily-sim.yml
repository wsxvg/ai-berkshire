name: 每日模拟实盘

on:
  schedule:
    # 北京时间 14:30 = UTC 6:30
    - cron: '30 6 * * 1-5'  # 周一至周五
  workflow_dispatch:  # 允许手动触发
    inputs:
      force:
        description: '强制执行（忽略非交易日检查）'
        type: boolean
        default: false

jobs:
  daily-sim:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install lightgbm scikit-learn numpy
          # 无额外依赖，jd_finance_api 用 stdlib

      - name: 运行模拟实盘
        env:
          JD_COOKIES: ${{ secrets.JD_COOKIES }}
        run: |
          python scripts/daily_simulation.py

      - name: 提交日报
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/sim/
          git diff --cached --quiet || git commit -m "模拟实盘日报 $(date +%Y-%m-%d)"
          git push
